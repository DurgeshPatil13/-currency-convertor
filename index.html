<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>💱 Currency Converter</h1>
            <p>Live Exchange Rates</p>
        </div>

        <div class="amount-section">
            <label>Amount</label>
            <input id="inputbox" type="number" placeholder="Enter Amount">
        </div>

        <div class="currency-section">

            <div class="from">
                <label>From</label>
                <select id="from" class="selectoption">
                    <option>USD</option>
             
                </select>
            </div>

            <button class="swap-btn">⇄</button>

            <div class="to">
                <label>To</label>
                <select id="to" class="otheroption">
                    <option>INR</option>
                
                </select>
            </div>

        </div>

        <button class="convert-btn">
            Convert
        </button>

        <div class="result">
            <h2>₹0.00</h2>
        </div>

    </div>
<script src="script.js"></script>
</body>
</html>
